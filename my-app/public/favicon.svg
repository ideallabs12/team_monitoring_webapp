<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Dark blue outer arc -->
  <path d="M 40 120 A 80 80 0 1 1 160 120" fill="none" stroke="#002147" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Three dashes above central hand -->
  <line x1="100" y1="45" x2="100" y2="55" stroke="#002147" stroke-width="5" stroke-linecap="round"/>
  <line x1="75" y1="55" x2="82" y2="62" stroke="#002147" stroke-width="5" stroke-linecap="round"/>
  <line x1="125" y1="55" x2="118" y2="62" stroke="#002147" stroke-width="5" stroke-linecap="round"/>

  <!-- Hands from left to right -->
  <!-- Yellow Hand (Left-most) -->
  <g fill="#FFB800" transform="translate(50, 115) scale(0.6) rotate(-15)">
    <rect x="-10" y="20" width="20" height="50"/>
    <!-- Fingers -->
    <rect x="-15" y="-10" width="6" height="25" rx="3"/>
    <rect x="-5" y="-15" width="6" height="30" rx="3"/>
    <rect x="5" y="-12" width="6" height="28" rx="3"/>
    <rect x="15" y="-5" width="6" height="20" rx="3"/>
    <circle cx="0" cy="15" r="14"/>
  </g>

  <!-- Green Hand -->
  <g fill="#00C48C" transform="translate(75, 95) scale(0.8) rotate(-5)">
    <rect x="-10" y="20" width="20" height="60"/>
    <rect x="-15" y="-10" width="6" height="25" rx="3"/>
    <rect x="-5" y="-15" width="6" height="30" rx="3"/>
    <rect x="5" y="-12" width="6" height="28" rx="3"/>
    <rect x="15" y="-5" width="6" height="20" rx="3"/>
    <circle cx="0" cy="15" r="14"/>
  </g>

  <!-- Blue Hand (Center) -->
  <g fill="#007AFF" transform="translate(100, 75) scale(1)">
    <rect x="-10" y="20" width="20" height="70"/>
    <rect x="-15" y="-10" width="6" height="25" rx="3"/>
    <rect x="-5" y="-15" width="6" height="30" rx="3"/>
    <rect x="5" y="-12" width="6" height="28" rx="3"/>
    <rect x="15" y="-5" width="6" height="20" rx="3"/>
    <circle cx="0" cy="15" r="14"/>
  </g>

  <!-- Purple Hand -->
  <g fill="#8A2BE2" transform="translate(125, 95) scale(0.8) rotate(5)">
    <rect x="-10" y="20" width="20" height="60"/>
    <rect x="-15" y="-5" width="6" height="20" rx="3"/>
    <rect x="-5" y="-12" width="6" height="28" rx="3"/>
    <rect x="5" y="-15" width="6" height="30" rx="3"/>
    <rect x="15" y="-10" width="6" height="25" rx="3"/>
    <circle cx="0" cy="15" r="14"/>
  </g>

  <!-- Red Hand (Right-most) -->
  <g fill="#FF4B4B" transform="translate(150, 115) scale(0.6) rotate(15)">
    <rect x="-10" y="20" width="20" height="50"/>
    <rect x="-15" y="-5" width="6" height="20" rx="3"/>
    <rect x="-5" y="-12" width="6" height="28" rx="3"/>
    <rect x="5" y="-15" width="6" height="30" rx="3"/>
    <rect x="15" y="-10" width="6" height="25" rx="3"/>
    <circle cx="0" cy="15" r="14"/>
  </g>
</svg>